<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depress Doomer</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Mobile Header -->
    <header class="mobile-header">
        <div class="avatar"><i class="fa-solid fa-user-secret"></i></div>
        <div class="brand-logo" style="margin: 0; padding: 0;">Depress Doomer</div>
        <select class="lang-select" id="langSwitcherMobile">
            <option value="en">EN</option>
            <option value="si">SI</option>
        </select>
    </header>

    <div class="app-layout">
        <!-- Left Sidebar (Desktop) -->
        <aside class="sidebar-left">
            <a href="index.html" class="brand-logo">Depress Doomer</a>
            <nav class="nav-links">
                <a href="index.html" class="nav-item active">
                    <i class="fa-solid fa-house"></i>
                    <span data-i18n="nav.feed">Home</span>
                </a>
                <a href="chat.html" class="nav-item">
                    <i class="fa-solid fa-envelope"></i>
                    <span data-i18n="nav.liveChat">Live Chat</span>
                </a>
                <a href="#" class="nav-item" id="logoutBtn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span data-i18n="nav.logout">Logout</span>
                </a>
            </nav>
            <button class="post-btn-sidebar" onclick="document.getElementById('postContent').focus()">
                <span data-i18n="feed.postButton">Post</span>
            </button>

            <div class="user-profile-btn">
                <div class="avatar" id="currentUserAvatar"><i class="fa-solid fa-user-secret"></i></div>
                <div class="user-info">
                    <strong style="color: var(--text-main);" id="currentUserName">Anonymous</strong>
                    <span style="color: var(--text-muted); font-size: 0.9rem;">@hidden</span>
                </div>
            </div>
        </aside>

        <!-- Main Feed Center -->
        <main class="main-feed">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
                <span data-i18n="nav.feed">Home</span>
                <select class="lang-select" id="langSwitcher">
                    <option value="en">EN</option>
                    <option value="si">SI</option>
                </select>
            </div>

            <!-- Compose Post Box -->
            <div class="compose-box">
                <div class="avatar"><i class="fa-solid fa-user-secret"></i></div>
                <div style="flex-grow: 1;">
                    <form id="createPostForm">
                        <textarea id="postContent" rows="2" placeholder="Share what's on your mind anonymously..." data-i18n-placeholder="feed.sharePrompt" required></textarea>
                        <div class="compose-actions">
                            <button type="submit" class="btn-post" data-i18n="feed.postButton">Post</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Feed Posts Container -->
            <div id="postsContainer">
                <!-- Posts will be injected here via app.js -->
            </div>
        </main>

        <!-- Right Sidebar (Desktop) -->
        <aside class="sidebar-right">
            <div class="widget">
                <div class="widget-title" data-i18n="sidebar.about">About Us</div>
                <p style="color: var(--text-muted); font-size: 0.9rem;" data-i18n="sidebar.description">
                    Depress Doomer is a safe haven. Share your mental struggles anonymously and find people who understand.
                </p>
            </div>
            <div class="widget" style="background-color: rgba(29, 155, 240, 0.1); border: 1px solid var(--primary-color);">
                <div style="color: var(--primary-color); font-weight: 600; font-size: 0.9rem;">
                    <i class="fa-solid fa-shield-halved"></i> <span data-i18n="sidebar.privacy">100% Anonymous public front.</span>
                </div>
            </div>
        </aside>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav">
        <a href="index.html" class="mobile-nav-item active"><i class="fa-solid fa-house"></i></a>
        <a href="chat.html" class="mobile-nav-item"><i class="fa-solid fa-envelope"></i></a>
        <a href="#" class="mobile-nav-item" id="logoutBtnMobile"><i class="fa-solid fa-right-from-bracket"></i></a>
    </nav>

    <!-- App Logic -->
    <script>
        // AUTH GUARD: MUST BE LOGGED IN TO SEE ANYTHING
        const user = JSON.parse(localStorage.getItem('depressDoomerUser'));
        if (!user) {
            window.location.href = "login.html";
        } else {
            // Setup Profile Display
            const nameEl = document.getElementById('currentUserName');
            if (nameEl) nameEl.textContent = user.nickname;

            // Admin Access
            if (user.email === 'mentalistwuwi@gmail.com') {
                const navLinks = document.querySelectorAll('.nav-links');
                navLinks.forEach(nav => {
                    const adminLink = document.createElement('a');
                    adminLink.href = "admin.html";
                    adminLink.className = "nav-item";
                    adminLink.innerHTML = '<i class="fa-solid fa-user-shield"></i><span>Admin Panel</span>';
                    nav.insertBefore(adminLink, nav.lastElementChild);
                });
                
                const mobileNav = document.querySelector('.mobile-nav');
                if (mobileNav) {
                    const adminLinkMob = document.createElement('a');
                    adminLinkMob.href = "admin.html";
                    adminLinkMob.className = "mobile-nav-item";
                    adminLinkMob.innerHTML = '<i class="fa-solid fa-user-shield"></i>';
                    mobileNav.insertBefore(adminLinkMob, mobileNav.lastElementChild);
                }
            }
        }
    </script>
    <script type="module" src="js/i18n.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        const doLogout = async () => {
            await signOut(auth);
            localStorage.removeItem('depressDoomerUser');
            window.location.href = "login.html";
        };
        document.getElementById('logoutBtn')?.addEventListener('click', doLogout);
        document.getElementById('logoutBtnMobile')?.addEventListener('click', doLogout);
    </script>
</body>
</html>
