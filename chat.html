<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat - Depress Doomer</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 75vh;
        }
        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .message {
            max-width: 80%;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            background: var(--surface-color);
            align-self: flex-start;
        }
        .message.mine {
            background: rgba(99, 102, 241, 0.2);
            align-self: flex-end;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        .msg-author {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }
        .chat-input-area {
            display: flex;
            gap: 1rem;
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <nav class="navbar">
        <a href="index.html" class="nav-brand">Depress Doomer</a>
        <div class="nav-controls">
            <a href="index.html" class="btn btn-outline" data-i18n="nav.feed">Back to Feed</a>
            <select class="lang-switcher" id="langSwitcher">
                <option value="en">English</option>
                <option value="si">සිංහල</option>
            </select>
        </div>
    </nav>

    <div class="container">
        <!-- CRITICAL CHAT WARNING -->
        <div class="alert-box" style="text-align: center; font-size: 1.1rem; padding: 1.2rem; background: rgba(239, 68, 68, 0.2);">
            <strong><i class="fa-solid fa-triangle-exclamation"></i> <span data-i18n="chat.warning">WARNING: Please avoid sharing your personal information with anyone. Stay completely anonymous.</span></strong>
        </div>

        <div class="glass-panel chat-container">
            <h3 style="margin-bottom: 1rem;"><i class="fa-solid fa-comments"></i> <span data-i18n="chat.title">General Anonymous Chat</span></h3>
            
            <div class="chat-messages" id="chatBox">
                <!-- Example message -->
                <div class="message">
                    <div class="msg-author">Anonymous_X</div>
                    <div>It's really hard to wake up today.</div>
                </div>
                <div class="message mine">
                    <div class="msg-author">You</div>
                    <div>I understand how you feel. Take it one step at a time.</div>
                </div>
            </div>

            <form class="chat-input-area" id="chatForm">
                <input type="text" class="form-control" id="chatMsg" placeholder="Type an anonymous message..." required>
                <button type="submit" class="btn btn-primary" data-i18n="chat.send">Send <i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <script type="module" src="js/i18n.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
