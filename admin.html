<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Depress Doomer</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        .admin-table th, .admin-table td {
            padding: 1.2rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }
        .admin-table th {
            color: var(--text-muted);
            font-weight: 700;
            background: rgba(255,255,255,0.02);
        }
        .sensitive-data {
            color: #fca5a5;
            font-weight: 500;
        }
        
        .admin-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0.5rem 1rem;
            transition: var(--transition);
            border-radius: var(--radius-sm);
        }
        .tab-btn:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }
        .tab-btn.active {
            color: var(--primary);
            background: rgba(99,102,241,0.1);
        }
    </style>
</head>
<body>
    <div class="blob blob-primary"></div>
    <div class="blob blob-accent"></div>

    <!-- Mobile Header -->
    <header class="mobile-header glass-panel" style="border-radius: 0; border-top: none; border-left: none; border-right: none;">
        <div class="brand-logo" style="margin: 0; font-size: 1.5rem; cursor: pointer;" onclick="window.location.href='index.html'"><i class="fa-solid fa-user-shield"></i> Dashboard</div>
    </header>

    <div class="app-layout">
        <!-- Left Sidebar (Desktop) -->
        <aside class="sidebar-left glass-panel">
            <div class="brand-logo" style="cursor: pointer;" onclick="window.location.href='index.html'"><i class="fa-solid fa-moon" style="color: var(--primary);"></i> Depress Doomer</div>
            <nav class="nav-links">
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-house"></i>
                    <span>Home</span>
                </a>
                <a href="chat.html" class="nav-item">
                    <i class="fa-solid fa-message"></i>
                    <span>Live Chat</span>
                </a>
                <a href="admin.html" class="nav-item active admin-link">
                    <i class="fa-solid fa-user-shield"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" id="logoutBtn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </nav>
            <div class="user-profile-btn">
                <div class="avatar" id="currentUserAvatar"><i class="fa-solid fa-user-shield"></i></div>
                <div style="display: flex; flex-direction: column;">
                    <strong id="currentUserName" style="font-size: 1rem;">Admin</strong>
                    <span style="color: var(--primary); font-size: 0.85rem;">Moderator</span>
                </div>
            </div>
        </aside>

        <!-- Admin Area Center -->
        <main class="main-feed" style="grid-column: 2 / -1;">
            <div class="glass-panel" style="padding: 2rem;">
                <div class="admin-tabs" id="adminTabs">
                    <button class="tab-btn active" onclick="switchTab('identities', this)"><i class="fa-solid fa-users-viewfinder"></i> Real Identities Log</button>
                    <button class="tab-btn" onclick="switchTab('reports', this)"><i class="fa-solid fa-flag"></i> Reports Inbox</button>
                    <button class="tab-btn" onclick="switchTab('manage_admins', this)" id="manageAdminsTab" style="display: none;"><i class="fa-solid fa-user-gear"></i> Manage Admins</button>
                </div>

                <div id="adminData" style="overflow-x: auto;">
                    <div style="padding: 2rem; text-align: center; color: var(--text-muted);">
                        <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                        <p style="margin-top: 1rem;">Loading secure data...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav">
        <a href="index.html" class="mobile-nav-item"><i class="fa-solid fa-house"></i></a>
        <a href="chat.html" class="mobile-nav-item"><i class="fa-solid fa-message"></i></a>
        <a href="admin.html" class="mobile-nav-item active admin-link"><i class="fa-solid fa-user-shield"></i></a>
        <a href="#" class="mobile-nav-item" id="logoutBtnMobile"><i class="fa-solid fa-right-from-bracket"></i></a>
    </nav>

    <!-- App Logic -->
    <script>
        const user = JSON.parse(localStorage.getItem('depressDoomerUser'));
        const isSuperAdminEmail = user && user.email === 'mentalistwuwi@gmail.com';
        
        if (!user || (!user.adminRoles && !isSuperAdminEmail)) {
            alert("Unauthorized. Admin access only.");
            window.location.href = "index.html";
        } else {
            const nameEl = document.getElementById('currentUserName');
            if (nameEl) nameEl.textContent = user.nickname;
            
            if (isSuperAdminEmail || (user.adminRoles && user.adminRoles.isSuperAdmin)) {
                document.getElementById('manageAdminsTab').style.display = 'inline-block';
            }
        }

        function switchTab(tabName, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            if (window.loadAdminTab) {
                window.loadAdminTab(tabName);
            }
        }
    </script>
    <script type="module" src="js/app.js"></script>
    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        const doLogout = async () => {
            await signOut(auth);
            localStorage.removeItem('depressDoomerUser');
            window.location.href = "login.html";
        };
        document.getElementById('logoutBtn')?.addEventListener('click', doLogout);
        document.getElementById('logoutBtnMobile')?.addEventListener('click', doLogout);
    </script>
</body>
</html>
