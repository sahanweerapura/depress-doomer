<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Depress Doomer</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .admin-table th, .admin-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .admin-table th {
            color: var(--text-muted);
            font-weight: 600;
        }
        .sensitive-data {
            color: #fca5a5;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- Mobile Header -->
    <header class="mobile-header" style="background-color: rgba(244, 33, 46, 0.2); border-bottom: 1px solid #f4212e;">
        <div class="avatar"><i class="fa-solid fa-user-shield"></i></div>
        <div class="brand-logo" style="margin: 0; padding: 0; color: #fca5a5;">Admin Panel</div>
    </header>

    <div class="app-layout">
        <!-- Left Sidebar (Desktop) -->
        <aside class="sidebar-left">
            <a href="index.html" class="brand-logo" style="background: none; color: #fca5a5; -webkit-text-fill-color: #fca5a5;">Admin Panel</a>
            <nav class="nav-links">
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-house"></i>
                    <span>Home</span>
                </a>
                <a href="chat.html" class="nav-item">
                    <i class="fa-solid fa-envelope"></i>
                    <span>Live Chat</span>
                </a>
                <a href="admin.html" class="nav-item active" style="color: #fca5a5;">
                    <i class="fa-solid fa-user-shield"></i>
                    <span>Admin Panel</span>
                </a>
                <a href="#" class="nav-item" id="logoutBtn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </nav>
            <div class="user-profile-btn">
                <div class="avatar" id="currentUserAvatar"><i class="fa-solid fa-user-shield"></i></div>
                <div class="user-info">
                    <strong style="color: var(--text-main);" id="currentUserName">Admin</strong>
                    <span style="color: var(--text-muted); font-size: 0.9rem;">@admin</span>
                </div>
            </div>
        </aside>

        <!-- Admin Area Center -->
        <main class="main-feed" style="grid-column: 2 / -1;">
            <div class="page-header" style="background-color: rgba(244, 33, 46, 0.1); border-bottom: 1px solid #f4212e;">
                <span style="color: #fca5a5;"><i class="fa-solid fa-user-shield"></i> Restricted Admin Dashboard</span>
            </div>

            <div style="padding: 1.5rem;">
                <h2 style="margin-bottom: 0.5rem;">Real Identity Log</h2>
                <p style="color: var(--text-muted); margin-bottom: 2rem;">This data is strictly confidential. View the real identities behind anonymous posts.</p>

                <div class="widget" id="adminData" style="background-color: var(--bg-color); border: 1px solid var(--border-color); overflow-x: auto;">
                    <!-- Table injected via app.js -->
                    <div style="padding: 2rem; text-align: center; color: var(--text-muted);">
                        <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                        <p style="margin-top: 1rem;">Loading secure data...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav">
        <a href="index.html" class="mobile-nav-item"><i class="fa-solid fa-house"></i></a>
        <a href="chat.html" class="mobile-nav-item"><i class="fa-solid fa-envelope"></i></a>
        <a href="admin.html" class="mobile-nav-item active" style="color: #fca5a5;"><i class="fa-solid fa-user-shield"></i></a>
        <a href="#" class="mobile-nav-item" id="logoutBtnMobile"><i class="fa-solid fa-right-from-bracket"></i></a>
    </nav>

    <!-- App Logic -->
    <script>
        // STRICT ADMIN AUTH GUARD
        const user = JSON.parse(localStorage.getItem('depressDoomerUser'));
        if (!user || user.email !== 'mentalistwuwi@gmail.com') {
            alert("Unauthorized. Admin access only.");
            window.location.href = "index.html";
        } else {
            const nameEl = document.getElementById('currentUserName');
            if (nameEl) nameEl.textContent = user.nickname;
        }
    </script>
    <script type="module" src="js/app.js"></script>
    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        const doLogout = async () => {
            await signOut(auth);
            localStorage.removeItem('depressDoomerUser');
            window.location.href = "login.html";
        };
        document.getElementById('logoutBtn')?.addEventListener('click', doLogout);
        document.getElementById('logoutBtnMobile')?.addEventListener('click', doLogout);
    </script>
</body>
</html>
