<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Depress Doomer</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-nav { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; }
        .admin-nav button { background: transparent; border: 1px solid var(--primary); color: white; padding: 0.5rem 1.5rem; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .admin-nav button:hover, .admin-nav button.active { background: rgba(99, 102, 241, 0.2); }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: rgba(0,0,0,0.3); border-radius: 8px; overflow: hidden; }
        .admin-table th, .admin-table td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); color: #e7e9ea; }
        .admin-table th { background: rgba(99, 102, 241, 0.1); color: var(--primary); font-weight: 600; }
        .sensitive-data { color: var(--danger); font-family: monospace; }
        @media (max-width: 768px) { .admin-table { display: block; overflow-x: auto; } }
    </style>
</head>
<body>
    <div class="blob blob-primary"></div>
    <div class="blob blob-danger" style="background: var(--danger); right: 0; bottom: 0;"></div>

    <div class="app-layout" style="display: block; max-width: 1200px; margin: 0 auto; padding: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 style="color: white;"><i class="fa-solid fa-user-shield" style="color: var(--primary);"></i> Admin Dashboard</h1>
            <button class="btn-primary" style="background: transparent; border: 1px solid var(--glass-border);" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i> Back to Haven</button>
        </div>

        <div class="glass-panel" style="min-height: 70vh;">
            <div class="admin-nav">
                <button onclick="window.loadAdminTab('identities')" id="tab-identities" class="active"><i class="fa-solid fa-users"></i> User Identities</button>
                <button onclick="window.loadAdminTab('reports')" id="tab-reports"><i class="fa-solid fa-flag"></i> Content Reports</button>
            </div>
            
            <div id="adminData">
                <div style="padding: 2rem; text-align: center;"><i class="fa-solid fa-spinner fa-spin fa-2x"></i> Loading Data Securely...</div>
            </div>
        </div>
    </div>

    <!-- The ?v=7 here forces the browser to load the new Super Admin functions -->
    <script type="module" src="js/app.js?v=7"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('depressDoomerUser'));
        if (!user || !user.adminRoles) window.location.href = "index.html";
        
        document.getElementById('tab-identities').addEventListener('click', function() {
            this.classList.add('active'); document.getElementById('tab-reports').classList.remove('active');
        });
        document.getElementById('tab-reports').addEventListener('click', function() {
            this.classList.add('active'); document.getElementById('tab-identities').classList.remove('active');
        });
    </script>
</body>
</html>
