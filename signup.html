<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Depress Doomer</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="container auth-container">
        <div class="glass-panel">
            <h2 style="text-align: center; margin-bottom: 1.5rem;" data-i18n="auth.signupTitle">Join Depress Doomer</h2>
            
            <div class="alert-box">
                <strong><i class="fa-solid fa-lock"></i> <span data-i18n="auth.privacyDisclaimerTitle">Privacy Guarantee:</span></strong><br>
                <span data-i18n="auth.privacyDisclaimer">Your real identity (Name, Email, Phone, Age) is strictly collected to prevent spam and for internal identity verification. It will NEVER be shared publicly. You will post and chat completely anonymously using a Nickname.</span>
            </div>

            <form id="signupForm">
                <!-- Real Details (Hidden from public) -->
                <div class="form-group">
                    <label data-i18n="auth.realName">Real Full Name</label>
                    <input type="text" class="form-control" id="realName" required>
                </div>
                <div class="form-group">
                    <label data-i18n="auth.age">Age</label>
                    <input type="number" class="form-control" id="age" min="13" max="100" required>
                </div>
                <div class="form-group">
                    <label data-i18n="auth.phone">Contact Number</label>
                    <input type="tel" class="form-control" id="phone" required>
                </div>
                <div class="form-group">
                    <label data-i18n="auth.email">Email Address</label>
                    <input type="email" class="form-control" id="email" required>
                </div>

                <hr style="border: 0; border-top: 1px solid var(--surface-border); margin: 2rem 0;">
                
                <!-- Public Details -->
                <div class="form-group">
                    <label data-i18n="auth.nickname">Public Nickname (This is what others will see)</label>
                    <input type="text" class="form-control" id="nickname" required>
                </div>
                <div class="form-group">
                    <label data-i18n="auth.password">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" data-i18n="auth.signupBtn">Create Anonymous Account</button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <p><span data-i18n="auth.haveAccount">Already have an account?</span> <a href="login.html" style="color: var(--primary-color);" data-i18n="nav.login">Login</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/i18n.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
