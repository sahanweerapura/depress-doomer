<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Depress Doomer</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container { width: 100%; max-width: 450px; padding: 2.5rem; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; z-index: 10; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.7); display: block; }
        
        .form-control {
            background: rgba(0, 0, 0, 0.6) !important;
            border: 2px solid rgba(99, 102, 241, 0.4) !important;
            border-radius: 8px !important;
            color: white !important;
            padding: 0.8rem !important;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }
        .form-control:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5) !important;
            outline: none;
        }
        .form-group label { font-weight: 600; color: #e7e9ea; margin-bottom: 0.4rem; display: block; }

        .submit-btn-glow {
            background: linear-gradient(135deg, #4f46e5, #4338ca) !important;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.6) !important;
            color: white !important;
            font-weight: 800 !important;
            font-size: 1.15rem !important;
            padding: 1rem !important;
            border: none !important;
            border-radius: 8px;
            transition: all 0.3s ease !important;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }
        .submit-btn-glow:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79, 70, 229, 0.9) !important; }

        .google-btn {
            background: white !important; color: #333 !important; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 1rem !important; border-radius: 8px; border: none; cursor: pointer; transition: 0.3s; margin-top: 1rem;
        }
        .google-btn:hover { background: #f1f5f9 !important; transform: translateY(-2px); }

        /* The Custom Hand/Heart Animation CSS */
        @keyframes slideUpHeart {
            0% { transform: translate(-50%, 100%); opacity: 0; }
            100% { transform: translate(-50%, 0); opacity: 0.15; }
        }
        @keyframes pulseHeart {
            0% { transform: translate(-50%, 0) scale(1); }
            50% { transform: translate(-50%, 0) scale(1.05); }
            100% { transform: translate(-50%, 0) scale(1); }
        }
        .bg-animated-icon {
            position: fixed; bottom: -20px; left: 50%; font-size: 45vw; color: #ef4444; z-index: 1; opacity: 0; pointer-events: none;
            animation: slideUpHeart 1.5s ease-out forwards, pulseHeart 4s ease-in-out 1.5s infinite;
        }
        @media (max-width: 768px) { .bg-animated-icon { font-size: 80vw; bottom: 0px; } .login-container { padding: 1.5rem; } }
    </style>
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; margin: 0; overflow: hidden;">
    <!-- Abstract Blobs -->
    <div class="blob blob-primary"></div>
    <div class="blob blob-accent"></div>

    <!-- The Animated Support Hands in the Background -->
    <i class="fa-solid fa-hand-holding-heart bg-animated-icon"></i>

    <div class="login-container">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fa-solid fa-moon fa-3x" style="color: var(--primary); margin-bottom: 1rem;"></i>
            <h2 style="font-weight: 800; font-size: 1.8rem; color: white;" data-i18n="auth.loginTitle">Welcome Back</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Enter your sanctuary.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label data-i18n="auth.email">Email Address</label>
                <input type="email" class="form-control" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label data-i18n="auth.password">Password</label>
                <input type="password" class="form-control" id="loginPassword" required>
            </div>
            <button type="submit" class="submit-btn-glow" style="width: 100%; margin-top: 1rem;" data-i18n="auth.loginBtn">Login</button>
        </form>

        <div style="display: flex; align-items: center; margin: 1.5rem 0;">
            <hr style="flex: 1; border: none; border-top: 1px solid rgba(255,255,255,0.1);">
            <span style="padding: 0 10px; color: var(--text-muted); font-size: 0.9rem;">OR</span>
            <hr style="flex: 1; border: none; border-top: 1px solid rgba(255,255,255,0.1);">
        </div>

        <button id="googleLoginBtn" class="google-btn" style="width: 100%;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" style="width: 20px;"> 
            <span data-i18n="auth.googleLogin">Sign in with Google</span>
        </button>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.95rem;">
            <span style="color: var(--text-muted);" data-i18n="auth.noAccount">Don't have an account?</span> <a href="signup.html" style="color: var(--primary); font-weight: bold; text-decoration: none;" data-i18n="auth.signupBtn">Create Anonymous Account</a>
        </p>
    </div>

    <script type="module" src="js/i18n.js"></script>
    <script type="module" src="js/auth.js?v=9"></script>
</body>
</html>
