<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Depress Doomer</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="container auth-container">
        <div class="glass-panel">
            <h2 style="text-align: center; margin-bottom: 1.5rem;" data-i18n="auth.loginTitle">Welcome Back</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label data-i18n="auth.email">Email Address</label>
                    <input type="email" class="form-control" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label data-i18n="auth.password">Password</label>
                    <input type="password" class="form-control" id="loginPassword" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" data-i18n="auth.loginBtn">Login</button>
            </form>

            <!-- Google Login Button (Optional integration point) -->
            <button class="btn btn-outline" id="googleLoginBtn" style="width: 100%; margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                <span data-i18n="auth.googleLogin">Sign in with Google</span>
            </button>

            <div style="text-align: center; margin-top: 1.5rem;">
                <p><span data-i18n="auth.noAccount">Don't have an account?</span> <a href="signup.html" style="color: var(--primary-color);" data-i18n="auth.signupBtn">Create Anonymous Account</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/i18n.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
