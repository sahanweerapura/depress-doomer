<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Depress Doomer</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="blob blob-primary"></div>
    <div class="blob blob-accent"></div>

    <div class="auth-wrapper">
        <div class="auth-box glass-panel">
            <h2 style="font-size: 2rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fa-solid fa-user-secret" style="color: var(--primary-color);"></i>
                Depress Doomer
            </h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;" data-i18n="auth.loginTitle">Welcome Back</p>

            <form id="loginForm">
                <div class="form-group">
                    <label data-i18n="auth.email">Email Address</label>
                    <input type="email" class="form-control" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label data-i18n="auth.password">Password</label>
                    <input type="password" class="form-control" id="loginPassword" required>
                </div>
                
                <button type="submit" class="btn-block btn-primary-auth" data-i18n="auth.loginBtn">Login</button>
            </form>

            <div style="display: flex; align-items: center; margin: 1.5rem 0;">
                <div style="flex-grow: 1; height: 1px; background-color: var(--border-color);"></div>
                <span style="padding: 0 1rem; color: var(--text-muted); font-size: 0.9rem;">or</span>
                <div style="flex-grow: 1; height: 1px; background-color: var(--border-color);"></div>
            </div>

            <button class="btn-block btn-outline-auth" id="googleLoginBtn">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                <span data-i18n="auth.googleLogin">Sign in with Google</span>
            </button>

            <div style="margin-top: 2rem; text-align: center; font-size: 0.95rem;">
                <span style="color: var(--text-muted);" data-i18n="auth.noAccount">Don't have an account?</span> 
                <a href="signup.html" style="color: var(--primary-color); font-weight: 600;" data-i18n="auth.signupBtn">Create Account</a>
            </div>
        </div>
    </div>

    <!-- Complete Profile Modal for Google Sign In -->
    <div id="completeProfileModal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <h3 style="margin-bottom: 1rem; color: var(--primary);">Complete Your Profile</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Since you logged in with Google, we just need a few more details to keep the community safe.</p>
            
            <form id="completeProfileForm">
                <div class="form-group">
                    <label>Real Full Name</label>
                    <input type="text" class="form-control" id="cpName" required>
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="tel" class="form-control" id="cpPhone" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Gender</label>
                        <select class="form-control" id="cpGender" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" class="form-control" id="cpAge" min="13" max="100" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Public Nickname</label>
                    <input type="text" class="form-control" id="cpNickname" required>
                </div>
                
                <button type="submit" class="btn-block btn-primary-auth" style="background-color: var(--primary-color); color: white;">Save & Continue</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/i18n.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
